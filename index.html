<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prode Mundial 2026 - Estudio Bissio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bissio: {
                            petrol: 'rgb(38, 78, 79)',
                            sand: 'rgb(216, 203, 169)',
                            forest: 'rgb(28, 32, 24)',
                            clay: 'rgb(198, 134, 106)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        quest: ['Questrial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Questrial&display=swap');
        
        html, body { 
            background-color: rgb(28, 32, 64) !important; 
            color: rgb(216, 203, 169);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .font-quest { font-family: 'Questrial', sans-serif; }

        /* Estilo para los botones color Arena */
        .btn-bissio {
            background-color: rgb(216, 203, 169);
            color: rgb(28, 32, 24);
            font-weight: 900;
        }

        .tab-active { 
            background-color: rgb(216, 203, 169) !important; 
            color: rgb(28, 32, 24) !important; 
            font-weight: 900; 
        }

        .match-card:focus-within { 
            border-color: rgb(216, 203, 169); 
            box-shadow: 0 0 0 1px rgb(216, 203, 169);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgb(216, 203, 169); 
            border-radius: 10px; 
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12 overflow-x-hidden text-center sm:text-left bg-bissio-forest font-sans">

    <!-- PANTALLA DE ACCESO -->
    <div id="lock-screen" class="fixed inset-0 bg-bissio-forest z-[200] flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="max-w-md w-full bg-bissio-petrol p-8 rounded-3xl border-2 border-bissio-sand/20 shadow-2xl text-center">
            <h2 class="text-2xl font-black uppercase italic text-bissio-sand mb-2 tracking-tighter font-quest text-center">Estudio Bissio</h2>
            <p class="text-bissio-sand/70 text-[10px] mb-6 uppercase font-bold tracking-[0.2em] font-quest text-center">Identificación de Empleado</p>
            
            <div class="space-y-4 text-left font-quest">
                <div>
                    <label class="block text-[10px] text-bissio-sand font-bold uppercase mb-1 ml-2 tracking-widest">Email Corporativo</label>
                    <input type="email" id="access-email" placeholder="usuario@estudiobissio.com.ar" class="w-full bg-bissio-forest border-2 border-bissio-sand/10 rounded-xl p-3 text-bissio-sand outline-none focus:border-bissio-sand transition-all text-sm font-bold shadow-inner">
                </div>
                <div>
                    <label class="block text-[10px] text-bissio-sand font-bold uppercase mb-1 ml-2 tracking-widest">Código de Acceso</label>
                    <input type="text" id="access-code" placeholder="Pista: BISSIO2026" class="w-full bg-bissio-forest border-2 border-bissio-sand/10 rounded-xl p-3 text-center text-lg font-black tracking-widest text-bissio-sand outline-none focus:border-bissio-sand uppercase shadow-inner">
                </div>
            </div>

            <button onclick="checkWhitelistAccess()" class="w-full btn-bissio hover:brightness-110 py-4 rounded-2xl mt-6 transition-all uppercase tracking-widest shadow-xl font-quest">Entrar al Prode</button>
            <p id="access-error" class="text-red-400 text-[10px] mt-4 font-bold hidden uppercase font-quest">Email no autorizado o código incorrecto.</p>
        </div>
    </div>

    <!-- PANTALLA DE CARGA -->
    <div id="loading-overlay" class="fixed inset-0 bg-bissio-forest z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-bissio-sand border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-bissio-sand font-black uppercase italic tracking-widest animate-pulse font-quest">Estudio Bissio - Prode 2026</p>
    </div>

    <header class="bg-bissio-petrol shadow-xl p-4 sticky top-0 z-50 border-b-4 border-bissio-petrol/30">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black uppercase italic tracking-tighter text-bissio-sand font-quest">Prode Bissio 2026</h1>
            <div id="counter" class="text-[10px] font-bold bg-bissio-forest px-3 py-1.5 rounded-full border border-bissio-sand/20 text-bissio-sand shadow-inner font-quest">
                0 / 104
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-4 px-4">
        <nav class="flex bg-bissio-petrol rounded-xl p-1 shadow-2xl gap-1 mb-6">
            <button onclick="switchTab('jugar')" id="btn-jugar" class="flex-1 py-2.5 rounded-lg font-bold transition-all uppercase text-[10px] tracking-widest tab-active text-bissio-forest font-quest">Jugar</button>
            <button onclick="switchTab('la-banda')" id="btn-la-banda" class="flex-1 py-2.5 rounded-lg font-bold transition-all uppercase text-[10px] tracking-widest text-bissio-sand/50 font-quest">Posiciones</button>
            <button onclick="switchTab('reglas')" id="btn-reglas" class="flex-1 py-2.5 rounded-lg font-bold transition-all uppercase text-[10px] tracking-widest text-bissio-sand/50 font-quest">Reglas</button>
        </nav>

        <div id="notification" class="hidden fixed bottom-4 left-4 right-4 z-[60] p-4 rounded-xl border-2 flex items-center justify-center gap-3 shadow-2xl animate-bounce text-center font-bold font-quest text-xs"></div>

        <section id="sec-jugar" class="space-y-6 text-left">
            <div class="bg-bissio-petrol p-5 rounded-2xl border border-bissio-petrol/50 shadow-xl">
                <label class="block text-bissio-sand font-bold mb-2 uppercase text-[10px] tracking-widest font-quest">Tu Nombre para el Ranking</label>
                <input type="text" id="username" placeholder="Tu Nombre" class="w-full bg-bissio-forest border-2 border-bissio-sand/10 rounded-xl p-3 text-bissio-sand focus:border-bissio-sand outline-none transition-all text-lg font-bold shadow-inner">
                <p id="user-email-display" class="text-[9px] text-bissio-sand/30 mt-2 italic font-bold uppercase tracking-widest"></p>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filterPhase('groups')" id="f-groups" class="px-5 py-2 rounded-full tab-active font-bold text-[10px] uppercase border-2 border-bissio-sand font-quest">Grupos</button>
                <button onclick="filterPhase('k32')" id="f-k32" class="px-5 py-2 rounded-full bg-bissio-petrol text-bissio-sand/50 font-bold text-[10px] uppercase border-2 border-bissio-petrol/50 font-quest">16vos</button>
                <button onclick="filterPhase('k16')" id="f-k16" class="px-5 py-2 rounded-full bg-bissio-petrol text-bissio-sand/50 font-bold text-[10px] uppercase border-2 border-bissio-petrol/50 font-quest">Octavos</button>
                <button onclick="filterPhase('final')" id="f-final" class="px-5 py-2 rounded-full bg-bissio-petrol text-bissio-sand/50 font-bold text-[10px] uppercase border-2 border-bissio-petrol/50 font-quest">Finales</button>
            </div>

            <div id="groups-container" class="space-y-4"></div>

            <div class="mt-8 flex justify-center pb-12">
                <button onclick="saveProde()" id="btn-save" class="w-full btn-bissio hover:brightness-110 py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl transform active:scale-95 transition-all uppercase tracking-widest text-sm font-quest">
                    <span>Guardar mi Pronóstico</span>
                </button>
            </div>
        </section>

        <section id="sec-la-banda" class="hidden bg-bissio-petrol p-6 rounded-3xl border border-bissio-petrol/50 shadow-2xl">
            <h2 class="text-xl font-black mb-6 uppercase text-bissio-sand font-quest">Ranking del Estudio</h2>
            <div id="participants-list" class="grid gap-3 text-left"></div>
        </section>

        <section id="sec-reglas" class="hidden bg-bissio-petrol p-8 rounded-3xl border border-bissio-petrol/50 shadow-2xl text-left">
            <h2 id="rules-title" onclick="adminClick()" class="text-3xl font-black italic text-bissio-sand uppercase tracking-tighter cursor-pointer font-quest">Reglas</h2>
            <div class="mt-6 space-y-6">
                <div class="flex gap-4">
                    <div class="btn-bissio px-4 py-2 rounded-xl text-2xl h-fit">3</div>
                    <div><h3 class="font-black text-bissio-sand uppercase font-quest">Pleno</h3><p class="text-bissio-sand/60 text-sm">Goles exactos de ambos.</p></div>
                </div>
                <div class="flex gap-4 border-t border-bissio-forest pt-6">
                    <div class="bg-bissio-sand/20 text-bissio-sand border border-bissio-sand px-4 py-2 rounded-xl text-2xl h-fit">1</div>
                    <div><h3 class="font-black text-bissio-sand uppercase font-quest">Tendencia</h3><p class="text-bissio-sand/60 text-sm">Acertás ganador o empate.</p></div>
                </div>
            </div>

            <div id="admin-panel" class="hidden mt-10 p-6 bg-bissio-forest rounded-2xl border-2 border-bissio-sand shadow-2xl">
                <h3 class="text-bissio-sand font-black uppercase text-center font-quest mb-4">Mesa de Control</h3>
                <div class="flex bg-bissio-petrol p-1 rounded-xl mb-4 gap-1">
                    <button onclick="switchAdminTab('teams')" id="tab-adm-teams" class="flex-1 py-1 text-[8px] font-bold uppercase btn-bissio rounded-lg">Equipos</button>
                    <button onclick="switchAdminTab('scores')" id="tab-adm-scores" class="flex-1 py-1 text-[8px] font-bold uppercase text-bissio-sand/50">Goles</button>
                </div>
                <div id="admin-teams-view" class="space-y-3 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar"></div>
                <div id="admin-scores-view" class="hidden space-y-2 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar"></div>
                <button onclick="saveAdminData()" class="mt-6 w-full btn-bissio py-3 rounded-xl font-bold uppercase text-xs font-quest">Publicar Cambios</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIGURACIÓN MAESTRA
        const MASTER_ACCESS_CODE = "BISSIO2026";
        const ALLOWED_EMAILS = [
            'maestro@prode.com', 'lmartins@estudiobissio.com.ar', 'imartins@estudiobissio.com.ar', 'sprandi@estudiobissio.com.ar',
            'panria@estudiobissio.com.ar', 'nr.artech@gmail.com', 'elizabeth.perez@geatech.ar', 'rfernandez@estudiobissio.com.ar',
            'bdieguez@estudiobissio.com.ar', 'mrojas@estudiobissio.com.ar', 'ndussich@estudiobissio.com.ar', 'laguirre@estudiobissio.com.ar',
            'ecabana@estudiobissio.com.ar', 'atoledo@estudiobissio.com.ar', 'mabalos@estudiobissio.com.ar', 'fdimartino@estudiobissio.com.ar',
            'dlares@estudiobissio.com.ar', 'mdasilva@estudiobissio.com.ar', 'afarias@estudiobissio.com.ar', 'cblanco@estudiobissio.com.ar',
            'aassmann@estudiobissio.com.ar', 'agirasole@estudiobissio.com.ar', 'cmamchur@estudiobissio.com.ar', 'dmonteleone@estudiobissio.com.ar',
            'mgonzalez@estudiobissio.com.ar', 'spilaria@estudiobissio.com.ar', 'mreyes@estudiobissio.com.ar', 'jpallotta@estudiobissio.com.ar',
            'icastillo@estudiobissio.com.ar', 'cgarro@estudiobissio.com.ar', 'dtabuchini@estudiobissio.com.ar', 'tavalos@estudiobissio.com.ar',
            'mercolano@estudiobissio.com.ar', 'klopez@estudiobissio.com.ar', 'citurri@estudiobissio.com.ar', 'tlarrosa@estudiobissio.com.ar',
            'dsaucedo@estudiobissio.com.ar', 'eluna@estudiobissio.com.ar', 'lara.bissio@estudiobissio.com.ar', 'tjuynevich@estudiobissio.com.ar',
            'jhbissio@estudiobissio.com.ar', 'hdbissio@estudiobissio.com.ar', 'labissio@estudiobissio.com.ar'
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyBZilPXy82ISEeuvxNVGbA_uCQs0bYZshE",
            authDomain: "mundial-2026-964fb.firebaseapp.com",
            projectId: "mundial-2026-964fb",
            storageBucket: "mundial-2026-964fb.firebasestorage.app",
            messagingSenderId: "654587372341",
            appId: "1:654587372341:web:89daa2fb22da1b173e227c",
            measurementId: "G-F7VMRE82BE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'mundial-2026'; 

        let masterTeams = {};
        for(let i=1; i<=48; i++) masterTeams[`g${i}`] = `Equipo ${i}`;
        for(let i=1; i<=64; i++) masterTeams[`k${i}`] = `Cupo ${i}`;

        const MATCH_DEFS = [];
        let mid = 1;
        const GROUP_LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
        GROUP_LETTERS.forEach((letter, gIdx) => {
            const teamIds = [`g${gIdx*4+1}`, `g${gIdx*4+2}`, `g${gIdx*4+3}`, `g${gIdx*4+4}`];
            [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach(idx => MATCH_DEFS.push({ id: mid++, phase: 'groups', title: `Grupo ${letter}`, t1: teamIds[idx[0]], t2: teamIds[idx[1]] }));
        });
        for(let i=0; i<16; i++) MATCH_DEFS.push({ id: mid++, phase: 'k32', title: '16vos', t1: `k${i*2+1}`, t2: `k${i*2+2}`, isK: true });
        for(let i=0; i<8; i++) MATCH_DEFS.push({ id: mid++, phase: 'k16', title: 'Octavos', t1: `k${33+i*2}`, t2: `k${33+i*2+1}`, isK: true });
        for(let i=0; i<8; i++) MATCH_DEFS.push({ id: mid++, phase: 'final', title: 'Fases Finales', t1: `k${49+i*2}`, t2: `k${49+i*2+1}`, isK: true });

        let currentUserId = null;
        let myPredictions = {};
        let realResults = {};
        let activePhase = 'groups';
        let participantsData = [];
        let authenticatedEmail = '';
        let clickCount = 0;

        window.addEventListener('load', async () => {
            renderAdminForms();
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInAnonymously(auth);
            } catch (e) { console.error(e); }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('status-text').innerText = "ESTADIO CONECTADO";
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
                listenToConfig();
                listenToMyData();
                listenToParticipants();
                checkWhitelistAccess(true);
            }
        });

        function listenToConfig() {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'config', 'tournament'), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.results) realResults = data.results;
                    if (data.teams) masterTeams = { ...masterTeams, ...data.teams };
                    renderGroups();
                    updateParticipantsUI();
                    applyConfigToAdmin();
                } else { renderGroups(); }
            });
        }

        window.checkWhitelistAccess = (isAuto = false) => {
            const email = isAuto ? localStorage.getItem('prode_email') : document.getElementById('access-email').value.trim().toLowerCase();
            const code = isAuto ? localStorage.getItem('prode_access') : document.getElementById('access-code').value.trim().toUpperCase();
            if (!email || !code) return;

            const isEmailAllowed = ALLOWED_EMAILS.some(e => e.toLowerCase() === email);
            const isCodeCorrect = code === MASTER_ACCESS_CODE;

            if (isEmailAllowed && isCodeCorrect) {
                authenticatedEmail = email;
                localStorage.setItem('prode_email', email);
                localStorage.setItem('prode_access', code);
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('user-email-display').innerText = `IDENTIDAD ESTUDIO: ${email}`;
            } else if (!isAuto) {
                document.getElementById('access-error').classList.remove('hidden');
            }
        };

        function renderGroups() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            let lastTitle = '';
            MATCH_DEFS.filter(m => m.phase === activePhase).forEach(m => {
                if (m.title !== lastTitle) {
                    lastTitle = m.title;
                    const h = document.createElement('div');
                    h.className = "p-3 bg-bissio-petrol border-l-4 border-bissio-sand font-black text-[10px] uppercase text-bissio-sand mt-4 shadow-lg font-quest tracking-widest";
                    h.innerText = lastTitle;
                    container.appendChild(h);
                }
                const card = document.createElement('div');
                card.className = "match-card flex items-center justify-between bg-bissio-petrol/20 p-4 rounded-2xl border border-bissio-petrol/50 transition-all";
                card.innerHTML = `
                    <div class="flex-1 flex justify-end items-center gap-2 text-right">
                        <span class="font-bold text-[10px] text-bissio-sand truncate w-24 uppercase tracking-tight">${masterTeams[m.t1] || m.t1}</span>
                        <input type="number" value="${myPredictions[m.id]?.home ?? ''}" oninput="updatePredict(${m.id}, 'home', this.value)" class="w-11 h-11 text-center bg-bissio-forest border-2 border-bissio-sand/20 rounded-xl text-lg font-black text-bissio-sand outline-none">
                    </div>
                    <div class="px-2 text-bissio-sand/50 font-black text-[8px] uppercase text-center font-quest">vs</div>
                    <div class="flex-1 flex justify-start items-center gap-2">
                        <input type="number" value="${myPredictions[m.id]?.away ?? ''}" oninput="updatePredict(${m.id}, 'away', this.value)" class="w-11 h-11 text-center bg-bissio-forest border-2 border-bissio-sand/20 rounded-xl text-lg font-black text-bissio-sand outline-none">
                        <span class="font-bold text-[10px] text-bissio-sand truncate w-24 uppercase tracking-tight">${masterTeams[m.t2] || m.t2}</span>
                    </div>`;
                container.appendChild(card);
            });
        }

        window.filterPhase = (p) => {
            activePhase = p;
            document.querySelectorAll('[onclick^="filterPhase"]').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('bg-bissio-petrol', 'text-bissio-sand/50');
            });
            const btn = document.getElementById(`f-${p}`);
            btn.classList.add('tab-active');
            btn.classList.remove('bg-bissio-petrol', 'text-bissio-sand/50');
            renderGroups();
        };

        window.updatePredict = (id, side, val) => {
            if (!myPredictions[id]) myPredictions[id] = {};
            myPredictions[id][side] = val === "" ? null : parseInt(val);
            const count = Object.values(myPredictions).filter(p => p.home !== null && p.away !== null).length;
            document.getElementById('counter').innerText = `${count} / 104`;
        };

        window.saveProde = async () => {
            const name = document.getElementById('username').value.trim();
            if (!name) return showNotify("¡Poné tu nombre!", "error");
            try {
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'predictions', currentUserId), {
                    username: name, email: authenticatedEmail, predictions: myPredictions, updatedAt: new Date().toISOString()
                });
                showNotify("PRONÓSTICOS GUARDADOS", "success");
            } catch (e) { showNotify("Error al guardar.", "error"); }
        };

        function renderAdminForms() {
            const tmView = document.getElementById('admin-teams-view');
            const scView = document.getElementById('admin-scores-view');
            let tmHtml = '';
            GROUP_LETTERS.forEach((l, i) => {
                tmHtml += `<div class="p-2 bg-bissio-petrol rounded font-black text-[8px] uppercase text-bissio-sand">GRUPO ${l}</div>`;
                for(let j=1; j<=4; j++) {
                    const id = `g${i*4+j}`;
                    tmHtml += `<div class="flex items-center gap-2 bg-bissio-forest p-2 rounded"><span class="text-[8px] text-bissio-sand/30 w-4">${id}</span><input type="text" id="adm-tm-${id}" class="bg-transparent text-bissio-sand text-[10px] outline-none w-full border-b border-bissio-petrol uppercase font-bold"></div>`;
                }
            });
            tmView.innerHTML = tmHtml;
            let scHtml = '';
            MATCH_DEFS.forEach(m => {
                scHtml += `<div class="flex items-center justify-between bg-bissio-petrol p-2 rounded-lg border border-bissio-petrol/50 text-[9px]"><span class="w-16 truncate uppercase text-bissio-sand">${m.id}. ${m.title}</span><div class="flex gap-1"><input type="number" id="adm-h-${m.id}" class="w-7 h-7 bg-bissio-forest text-center rounded border border-bissio-sand/30 text-bissio-sand font-bold"><input type="number" id="adm-a-${m.id}" class="w-7 h-7 bg-bissio-forest text-center rounded border border-bissio-sand/30 text-bissio-sand font-bold"></div></div>`;
            });
            scView.innerHTML = scHtml;
        }

        function applyConfigToAdmin() {
            Object.entries(masterTeams).forEach(([id, name]) => {
                const el = document.getElementById(`adm-tm-${id}`);
                if (el) el.value = name;
            });
            Object.entries(realResults).forEach(([id, scores]) => {
                const h = document.getElementById(`adm-h-${id}`);
                const a = document.getElementById(`adm-a-${id}`);
                if (h) h.value = scores.home;
                if (a) a.value = scores.away;
            });
        }

        window.saveAdminData = async () => {
            const results = {}; const teams = {};
            MATCH_DEFS.forEach(m => {
                const h = document.getElementById(`adm-h-${m.id}`).value;
                const a = document.getElementById(`adm-a-${m.id}`).value;
                if(h !== "" && a !== "") results[m.id] = { home: parseInt(h), away: parseInt(a) };
            });
            Object.keys(masterTeams).forEach(id => {
                const el = document.getElementById(`adm-tm-${id}`);
                if (el) teams[id] = el.value;
            });
            try {
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'config', 'tournament'), { results, teams, updatedAt: new Date().toISOString() });
                showNotify("ACTUALIZADO", "success");
            } catch (e) { showNotify("Error admin.", "error"); }
        };

        window.adminClick = () => {
            clickCount++;
            if (clickCount >= 5) {
                document.getElementById('admin-panel').classList.toggle('hidden');
                showNotify("MESA DE CONTROL ABIERTA", "success");
                clickCount = 0;
            }
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-bissio-sand/50');
            });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            document.getElementById(`btn-${tab}`).classList.remove('text-bissio-sand/50');
        };

        window.switchAdminTab = (t) => {
            document.getElementById('admin-scores-view').classList.toggle('hidden', t !== 'scores');
            document.getElementById('admin-teams-view').classList.toggle('hidden', t !== 'teams');
            document.getElementById('tab-adm-teams').className = t === 'teams' ? "flex-1 py-1 text-[8px] font-bold uppercase btn-bissio rounded-lg font-quest" : "flex-1 py-1 text-[8px] font-bold uppercase text-bissio-sand/50 font-quest";
            document.getElementById('tab-adm-scores').className = t === 'scores' ? "flex-1 py-1 text-[8px] font-bold uppercase btn-bissio rounded-lg font-quest" : "flex-1 py-1 text-[8px] font-bold uppercase text-bissio-sand/50 font-quest";
        };

        function calculatePoints(preds, reals) {
            let total = 0;
            Object.entries(reals).forEach(([id, real]) => {
                const pred = preds[id];
                if (!pred || pred.home === null || pred.away === null) return;
                if (pred.home === real.home && pred.away === real.away) total += 3;
                else {
                    const rR = real.home > real.away ? 1 : (real.home < real.away ? 2 : 0);
                    const pR = pred.home > pred.away ? 1 : (pred.home < pred.away ? 2 : 0);
                    if (rR === pR) total += 1;
                }
            });
            return total;
        }

        function updateParticipantsUI() {
            const list = document.getElementById('participants-list');
            const sorted = participantsData.map(p => ({ ...p, points: calculatePoints(p.predictions || {}, realResults) })).sort((a, b) => b.points - a.points);
            list.innerHTML = '';
            sorted.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = `flex justify-between items-center bg-bissio-petrol/40 p-4 rounded-2xl border border-bissio-petrol/50 ${p.id === currentUserId ? 'border-bissio-sand shadow-xl' : ''}`;
                item.innerHTML = `<div class="flex flex-col text-left"><span class="font-black text-sm text-bissio-sand italic uppercase tracking-tight font-quest">${idx+1}. ${p.username || 'Anónimo'}</span><span class="text-[7px] text-bissio-sand/50 font-bold uppercase tracking-[0.1em]">${p.email || '---'}</span></div><div class="bg-bissio-sand text-bissio-forest px-4 py-1.5 rounded-full text-xs font-black shadow-lg font-quest">${p.points} PTS</div>`;
                list.appendChild(item);
            });
        }

        function listenToMyData() {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'predictions', currentUserId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.username) document.getElementById('username').value = data.username;
                    myPredictions = data.predictions || {};
                    renderGroups();
                }
            });
        }

        function listenToParticipants() {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'predictions'), (snap) => {
                participantsData = [];
                snap.forEach(d => participantsData.push({ id: d.id, ...d.data() }));
                updateParticipantsUI();
            });
        }

        function showNotify(msg, type) {
            const div = document.getElementById('notification');
            div.innerText = msg;
            div.className = `fixed bottom-4 left-4 right-4 z-[60] p-4 rounded-xl border-2 flex items-center justify-center gap-3 shadow-2xl animate-bounce ${type === 'error' ? 'bg-red-900/80 border-red-500 text-red-100 font-sans' : 'bg-bissio-sand text-bissio-forest font-quest'}`;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
